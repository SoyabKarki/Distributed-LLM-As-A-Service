name: CI

on:
  push:
  pull_request:

jobs:
  frontend-backend-integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Start containers
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Pull lightweight model
        run: docker compose exec -T ollama ollama pull smollm2:135m

      - name: Backend test 
        run: |
          sleep 10 && \
          curl -X POST http://localhost:8000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"model":"smollm2:135m","messages":[{"role":"user","content":"say backend ok"}]}' \
            | grep '"message"'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend test
        working-directory: frontend
          
        run: npx playwright test tests/chat.spec.js

      - name: Logs if failed
        if: failure()
        run: docker compose logs --no-color

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
  
  kubernetes-manifest-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      # Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
        
      # kubectl dry run
      - name: Validate manifests with kubectl dry run
        run: | 

          # Validate namespace
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          
          # Validate backend resources
          kubectl apply --dry-run=client -f k8s/backend/configmap.yaml
          kubectl apply --dry-run=client -f k8s/backend/deployment.yaml
          kubectl apply --dry-run=client -f k8s/backend/service.yaml
          kubectl apply --dry-run=client -f k8s/backend/hpa.yaml
          
          # Validate frontend resources
          kubectl apply --dry-run=client -f k8s/frontend/deployment.yaml
          kubectl apply --dry-run=client -f k8s/frontend/service.yaml
          
          # Validate ingress
          kubectl apply --dry-run=client -f k8s/ingress.yaml

          # Validation message
          echo "Kubernetes manifests validated successfully"